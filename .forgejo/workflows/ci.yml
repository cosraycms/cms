name: ci

on:
  push:

jobs:
  ci:
    runs-on: ci-base
    outputs:
      ref: ${{ steps.release_context.outputs.ref }}
      ref_name: ${{ steps.release_context.outputs.ref_name }}
      sha: ${{ steps.release_context.outputs.sha }}
    env:
      COSRAY_DB_HOST: pgsql
      COSRAY_DB_NAME: cosray
      COSRAY_DB_USER: cosray
      COSRAY_DB_PASSWORD: cosray
    services:
      pgsql:
        image: postgres:17
        env:
          POSTGRES_DB: cosray
          POSTGRES_USER: cosray
          POSTGRES_PASSWORD: cosray
        options: >-
          --health-cmd="pg_isready -U cosray -d cosray"
          --health-interval=5s --health-retries=20
    steps:
      - name: Capture release context
        id: release_context
        run: |
          printf 'ref=%s\n' "$FORGEJO_REF" >> "$FORGEJO_OUTPUT"
          printf 'ref_name=%s\n' "$FORGEJO_REF_NAME" >> "$FORGEJO_OUTPUT"
          printf 'sha=%s\n' "$FORGEJO_SHA" >> "$FORGEJO_OUTPUT"

      - name: Checkout repo
        uses: https://code.forgejo.org/actions/checkout@v5

      - name: Install packages with composer
        run: composer install --prefer-dist --no-interaction
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.GH_TOKEN }}"}}'

      - name: Run license lint checks
        run: composer license:lint

      - name: Run PHP lint checks
        run: composer lint

      - name: Run Markdown lint checks
        run: composer docs:lint
        env:
          npm_config_yes: "true"

      - name: Initialize database schema
        run: php ./run db:migrations --apply

      - name: Run tests with coverage
        run: composer coverage:test
        env:
          XDEBUG_MODE: coverage

      - name: Analyze coverage
        run: composer coverage:analyze

      - name: Deploy code coverage report
        if: ${{ always() && forgejo.ref == 'refs/heads/main' }}
        run: deploy-code-coverage .coverage

  release:
    needs: ci
    if: ${{ needs.ci.outputs.ref == 'refs/heads/main' || startsWith(needs.ci.outputs.ref, 'refs/tags/') }}
    uses: ./.forgejo/workflows/release.yml
    with:
      ref: ${{ needs.ci.outputs.ref }}
      ref_name: ${{ needs.ci.outputs.ref_name }}
      sha: ${{ needs.ci.outputs.sha }}
    secrets:
      panel_signing_key: ${{ secrets.PANEL_SIGNING_KEY }}
